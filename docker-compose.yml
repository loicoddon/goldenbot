version: "3.9"

# ============================================================
# GOLDENBOT — Virtual gold (XAU/USD) trading bot
# Phase 1 stack: backend (FastAPI), frontend (Next.js),
# discord_bot (discord.py), postgres, redis.
# ============================================================
services:
  db:
    image: postgres:16-alpine
    container_name: goldenbot_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # No host port mapping — backend reaches Postgres via the Docker network.
    # If you want to connect with psql/pgAdmin from host, add: ports: ["5433:5432"]
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: goldenbot_redis
    restart: unless-stopped
    # No host port mapping — containers reach Redis via the Docker network.
    # If you want to inspect from host, add: ports: ["6380:6379"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: goldenbot_backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    volumes:
      - ./backend:/app
      - charts_data:/app/charts
    # Hot-reload (--reload) is opt-in via env var: set UVICORN_RELOAD=1 in .env
    # for dev. Leave empty in production — --reload spawns file-watcher workers
    # that can leave zombie asyncio tasks polling external APIs.
    command: sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 ${UVICORN_RELOAD:+--reload}"

  discord_bot:
    build:
      context: ./discord_bot
      dockerfile: Dockerfile
    container_name: goldenbot_discord
    restart: unless-stopped
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - ./discord_bot:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: goldenbot_frontend
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3010}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  db_data:
  redis_data:
  charts_data:
